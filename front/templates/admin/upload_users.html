{% extends "front/base.html" %}
{% block title %}admin{% endblock %}
{% block content %}


    <div class="container my-5">
        <div class="card shadow-lg rounded-4 p-4 mx-auto" style="max-width: 500px;">
            <h2 class="text-center text-primary mb-4">Изменить тип пользователя</h2>
            <p class="text-center text-muted mb-4">{{ user.username }} | {{ user.email }}</p>

            <form method="post" class="d-flex flex-column gap-3">
                {% csrf_token %}

                <div class="form-group">
                    <label for="user_type" class="form-label fw-bold">Тип пользователя:</label>
                    <select name="user_type" id="user_type" class="form-select" required>
                        <option value="teacher" {% if user.user_type == "teacher" %}selected{% endif %}>Преподаватель
                        </option>
                        <option value="student" {% if user.user_type == "student" %}selected{% endif %}>Студент</option>
                        <option value="inactive" {% if user.user_type == "inactive" %}selected{% endif %}>Неактивный
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary rounded-pill fw-bold hover-glow mt-3">
                    <i class="bi bi-save me-1"></i> Сохранить
                </button>
            </form>

            {% for message in messages %}
                <p class="text-center text-success mt-3">{{ message }}</p>
            {% endfor %}
        </div>
    </div>

    <style>
        .hover-glow:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.5);
            transition: all 0.3s ease;
        }

        select.form-select {
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        select.form-select:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 8px rgba(13, 110, 253, 0.3);
            outline: none;
        }
    </style>



{% endblock %}
