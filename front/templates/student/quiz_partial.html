<form id="quiz-form" method="POST" action="{% url 'take_quiz' lesson.id %}">
    {% csrf_token %}
    {% for question in questions %}
        <div class="mb-4">
            <p>{{ forloop.counter }}. {{ question.text }}</p>
            {% for choice in question.choices.all %}
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="question_{{ question.id }}" value="{{ choice.id }}" id="choice_{{ choice.id }}">
                    <label class="form-check-label" for="choice_{{ choice.id }}">{{ choice.text }}</label>
                </div>
            {% endfor %}
        </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Жыйынтыкты көрүү</button>
</form>
