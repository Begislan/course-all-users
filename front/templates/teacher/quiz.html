{% extends "front/base.html" %}

{% block content %}
<style>
    /* Фон жана Видео */
    .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    .video-bg { width: 100%; height: 100%; object-fit: cover; }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.5)); }

    /* Контейнер */
    .main-container { padding: 40px 20px; z-index: 1; position: relative; display: flex; justify-content: center; }
    .quiz-container { max-width: 800px; width: 100%; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    
    /* Суроолор жана Жооптор */
    .question-card { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 25px; margin-bottom: 25px; border-left: 5px solid #3b82f6; transition: 0.3s; }
    .option-label { cursor: pointer; display: flex; align-items: center; background: rgba(255, 255, 255, 0.06); padding: 18px; border-radius: 15px; margin-bottom: 12px; transition: 0.3s; border: 1px solid transparent; }
    .option-label:hover { background: rgba(59, 130, 246, 0.1); border-color: #3b82f6; }
    .option-label input { margin-right: 15px; transform: scale(1.3); cursor: pointer; accent-color: #3b82f6; }
    
    /* Камера кутучасы */
    #camera-box { position: fixed; top: 20px; right: 20px; width: 180px; height: 135px; border-radius: 20px; overflow: hidden; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 1000; }
    
    /* Таймер */
    .timer-badge { font-family: 'Courier New', monospace; font-size: 1.2rem; color: #fbbf24; }
</style>

<canvas id="snapshot-canvas" style="display:none;"></canvas>

<div id="camera-box">
    <video id="webcam" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
</div>

<div class="video-background">
    <video autoplay muted loop class="video-bg" playsinline>
        <source src="https://videos.pexels.com/video-files/4328789/4328789-uhd_2560_1440_25fps.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>
</div>

<div class="container main-container">
    <div class="quiz-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-white fw-bold">{{ quiz.title }}</h2>
            <div class="timer-badge">⌛ <span id="timer">--:--</span></div>
        </div>
        
        <form id="quiz-form" method="POST">
            {% csrf_token %}
            {% for question in questions %}
            <div class="question-card">
                <p class="text-white fs-5 fw-bold mb-3">{{ forloop.counter }}. {{ question.text }}</p>
                {% for choice in question.choices.all %}
                <label class="option-label text-white">
                    <input type="radio" name="question_{{ question.id }}" value="{{ choice.id }}" required>
                    {{ choice.text }}
                </label>
                {% endfor %}
            </div>
            {% endfor %}
            <button type="submit" id="submit-btn" class="btn btn-primary w-100 py-3 mt-4 fw-bold shadow-lg">Тестти тапшыруу</button>
        </form>
    </div>
</div>

<script>
    const video = document.getElementById('webcam');
    const form = document.getElementById('quiz-form');
    const canvas = document.getElementById('snapshot-canvas');
    let stream = null;

    // 1. Камераны иштетүү
    async function setupCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        } catch (err) {
            alert("Тестти баштоо үчүн камера керек!");
            window.location.href = "{% url 'student' %}";
        }
    }
    setupCamera();

    // 2. Сүрөт тартуу жана Серверге жөнөтүү (Прокторинг)
    function takeSnapshot() {
        if (!stream) return;

        const context = canvas.getContext('2d');
        canvas.width = 640;
        canvas.height = 480;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Сүрөттү Base64 форматына айлантуу
        const imageData = canvas.toDataURL('image/jpeg', 0.9);

        // Серверге (save_quiz_screenshot) POST сурамын жөнөтүү
        fetch("{% url 'save_quiz_screenshot' lesson.id %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({ image: imageData })
        })
        .then(response => response.json())
        .then(data => {
            console.log("Сүрөт сакталды:", data.status);
        })
        .catch(err => console.error("Сүрөт жөнөтүүдө ката:", err));
    }

    // Ар бир 15 секунд сайын сүрөт тартып турат
    setInterval(takeSnapshot, 7000);

    // 3. Камеранын абалын жана жабык экенин текшерүү
    setInterval(() => {
        if (!stream) return;
        const track = stream.getVideoTracks()[0];
        
        if (!track || !track.enabled || track.readyState === 'ended') {
            alert("Камера өчүрүлдү! Тест аяктады.");
            form.submit();
        }

        const ctx = canvas.getContext('2d');
        canvas.width = 64; canvas.height = 64;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

        let sum = 0;
        for (let i = 0; i < data.length; i += 4) {
            sum += (data[i] + data[i+1] + data[i+2]) / 3;
        }
        let average = sum / (data.length / 4);

        if (average < 70 || average > 245) { 
             alert("Камера жабык экендиги аныкталды!");
             form.submit();
        }
    }, 3000);

    // 4. Таймер
    let timeLeft = {{ quiz.time_limit|default:5 }} * 60;
    const timerElem = document.getElementById('timer');
    const countdown = setInterval(() => {
        let min = Math.floor(timeLeft / 60);
        let sec = timeLeft % 60;
        timerElem.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
        if (timeLeft <= 0) { clearInterval(countdown); form.submit(); }
        timeLeft--;
    }, 1000);

    // 5. Башка жакка өтүүнү чектөө (Visibility)
    document.addEventListener("visibilitychange", () => {
        if (document.hidden) { 
            alert("Тест учурунда браузерден чыгууга болбойт!");
            form.submit(); 
        }
    });

    // Fullscreen мажбурлоо
    document.addEventListener('click', () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    }, { once: true });
</script>   
{% endblock %}
