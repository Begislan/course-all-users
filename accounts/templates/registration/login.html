{% extends "front/base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}

    <div class="video-background">
        <video autoplay muted loop class="video-bg" playsinline>
            <source src="https://videos.pexels.com/video-files/4328789/4328789-uhd_2560_1440_25fps.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <div class="container my-5 main-container">
        <div class="auth-container mx-auto bg-glass p-5 rounded-4 shadow-lg" style="max-width: 450px;">
            <div class="text-center mb-4 text-white">
                <i class="bi bi-person-circle display-1"></i>
                <h2 class="fw-bold">Кирүү</h2>
                <p class="text-light small">Логин жана паролуңузду жазыңыз</p>
            </div>

            <form method="post" class="text-white text-start">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small ms-2">Логин же Email:</label>
                    <input type="text" name="username" class="form-control bg-transparent text-white border-secondary py-2 px-3" required style="border-radius: 12px;">
                </div>
                <div class="mb-3">
                    <label class="form-label small ms-2">Пароль:</label>
                    <input type="password" name="password" class="form-control bg-transparent text-white border-secondary py-2 px-3" required style="border-radius: 12px;">
                </div>

                <div class="text-end mb-4">
                    <a href="{% url 'forgot_password' %}" class="text-light small text-decoration-none opacity-75 hover-opacity-100">Забыли пароль?</a>
                </div>
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg rounded-pill py-3 shadow hover-glow">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Кирүү
                    </button>
                </div>
            </form>

            {% if messages %}
                <div class="mt-3 text-center">
                    {% for message in messages %}
                        <p class="text-danger fw-bold small">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}

            <div class="text-center mt-4 border-top pt-3 border-secondary">
                <p class="small text-light mb-1">Аккаунтуңуз жокпу?</p>
                <a href="{% url 'signup' %}" class="btn btn-outline-light btn-sm rounded-pill px-4 shadow hover-glow">
                    Регистрация
                </a>
            </div>
        </div>
    </div>

    <style>
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 0; }
        .video-bg { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); }
        .main-container { position: relative; z-index: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 90vh; }
        .bg-glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .hover-glow:hover { box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); transform: translateY(-3px); transition: 0.3s; }
        .opacity-75:hover { opacity: 1 !important; }
    </style>

{% endblock %}
