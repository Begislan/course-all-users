{% extends "front/base.html" %}
{% block title %}Кирүү{% endblock %}
{% block content %}

    <div class="video-background">
        <video autoplay muted loop class="video-bg" playsinline>
            <source src="https://videos.pexels.com/video-files/4328789/4328789-uhd_2560_1440_25fps.mp4" type="video/mp4">
        </video>
        <div class="overlay-gradient"></div>
    </div>

    <div class="container main-container">
        <div class="auth-card-glass shadow-2xl">
            <div class="auth-header text-center">
                <div class="brand-icon">
                    <i class="bi bi-person-circle"></i>
                </div>
                <h1 class="auth-title">Кирүү</h1>
                <p class="auth-subtitle">Логин жана паролуңузду жазыңыз</p>
            </div>

            <form method="post" class="auth-form mt-4">
                {% csrf_token %}
                
                <div class="input-group-custom">
                    <label class="input-label">Логин же Email:</label>
                    <input type="text" name="username" class="custom-field" placeholder="Iskhak" required>
                </div>

                <div class="input-group-custom mt-3">
                    <label class="input-label">Пароль:</label>
                    <input type="password" name="password" class="custom-field" placeholder="••••••••" required>
                </div>

                <div class="text-end mt-2">
                    <a href="{% url 'forgot_password' %}" class="forgot-link">Забыли пароль?</a>
                </div>
                
                <div class="action-btn-wrapper mt-4">
                    <button type="submit" class="btn-login-gradient">
                        <i class="bi bi-box-arrow-in-right" ></i> Кирүү
                    </button>
                </div>
            </form>

            {% if messages %}
                <div class="error-messages mt-3">
                    {% for message in messages %}
                        <div class="alert-custom text-center">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}

            <div class="auth-footer mt-5 border-t border-white/10 pt-4">
                <p class="footer-text">Аккаунтуңуз жокпу?</p>
                <a href="{% url 'signup' %}" class="btn-register-outline">Регистрация</a>
            </div>
        </div>
    </div>

    <style>
        /* image_98ea9b.jpg стилиндеги түстөр жана эффекттер */
        :root {
            --glass-bg: rgba(30, 41, 59, 0.6); 
            --accent-green: #10b981; /* image_98ea9b.jpg кирүү баскычынын түсү */
            --input-border: rgba(255, 255, 255, 0.15);
        }

        .video-background { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .video-bg { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4) contrast(1.1); }
        .overlay-gradient { position: absolute; inset: 0; background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%); }

        .main-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Glassmorphism картасы */
        .auth-card-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px 40px;
            width: 100%;
            max-width: 440px;
            color: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.8s ease-out;
        }

        .brand-icon { font-size: 4.5rem; line-height: 1; margin-bottom: 10px; opacity: 0.95; }
        .auth-title { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 5px; }
        .auth-subtitle { color: rgba(255, 255, 255, 0.6); font-size: 0.95rem; }

        /* Талаалардын стили */
        .input-group-custom { text-align: left; }
        .input-label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.7); margin-left: 12px; margin-bottom: 6px; }
        
        .custom-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--input-border);
            border-radius: 16px;
            padding: 14px 18px;
            color: white;
            transition: 0.3s;
        }
        .custom-field:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-green);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }

        /* Баскычтар (image_98ea9b.jpg жана курс .jpg айкалышы) */
        .btn-login-gradient {
            width: 100%;
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.4s;
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
        }
        .btn-login-gradient:hover {
            transform: translateY(-3px);
            background: #059669;
            box-shadow: 0 15px 30px -5px rgba(16, 185, 129, 0.5);
        }

        .forgot-link { font-size: 0.85rem; color: rgba(255,255,255,0.5); text-decoration: none; transition: 0.3s; }
        .forgot-link:hover { color: white; }

        .btn-register-outline {
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            text-decoration: none;
            padding: 8px 30px;
            border-radius: 50px;
            font-size: 0.9rem;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-register-outline:hover { background: white; color: #1e293b; font-weight: 600; }

        .alert-custom { color: #f87171; font-weight: 600; font-size: 0.9rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Мобилдик версия */
        @media (max-width: 480px) {
            .auth-card-glass { padding: 40px 25px; margin: 15px; }
            .auth-title { font-size: 1.8rem; }
        }
    </style>

{% endblock %}
